<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Patternpilot workspace map</title>
  <desc id="desc">A simple map of the Patternpilot workspace showing bindings, projects, runs, and state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfd"/>
      <stop offset="100%" stop-color="#f1f5fa"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #10253d; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #425466; }
      .group { fill: #ffffff; stroke: #ccd7e2; stroke-width: 2; }
      .groupTitle { font: 700 22px Arial, sans-serif; fill: #17324d; }
      .groupText { font: 400 16px Arial, sans-serif; fill: #4d5e70; }
      .badge { fill: #e6f0fb; }
      .badgeText { font: 700 14px Arial, sans-serif; fill: #265b8f; }
      .line { stroke: #91a3b5; stroke-width: 3; fill: none; marker-end: url(#marker); }
    </style>
    <marker id="marker" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#91a3b5"/>
    </marker>
  </defs>

  <rect width="1200" height="470" rx="28" fill="url(#bg)"/>
  <text x="70" y="72" class="title">Patternpilot Workspace</text>
  <text x="70" y="104" class="subtitle">Vier Bereiche, vier klare Rollen.</text>

  <rect x="60" y="150" width="240" height="230" rx="22" class="group"/>
  <rect x="82" y="170" width="84" height="28" rx="14" class="badge"/>
  <text x="124" y="189" text-anchor="middle" class="badgeText">BINDINGS</text>
  <text x="82" y="230" class="groupTitle">bindings/project</text>
  <text x="82" y="265" class="groupText">Technische Projektanbindung</text>
  <text x="82" y="292" class="groupText">Policies, Rules, Watchlist</text>
  <text x="82" y="319" class="groupText">Hier steht, wie Patternpilot</text>
  <text x="82" y="346" class="groupText">auf dein Ziel schaut.</text>

  <rect x="335" y="150" width="240" height="230" rx="22" class="group"/>
  <rect x="357" y="170" width="86" height="28" rx="14" class="badge"/>
  <text x="400" y="189" text-anchor="middle" class="badgeText">PROJECTS</text>
  <text x="357" y="230" class="groupTitle">projects/project</text>
  <text x="357" y="265" class="groupText">Lesbarer Arbeitsraum</text>
  <text x="357" y="292" class="groupText">Intake, Reviews, Reports</text>
  <text x="357" y="319" class="groupText">Das ist der Bereich, den</text>
  <text x="357" y="346" class="groupText">Menschen am meisten lesen.</text>

  <rect x="610" y="150" width="240" height="230" rx="22" class="group"/>
  <rect x="632" y="170" width="64" height="28" rx="14" class="badge"/>
  <text x="664" y="189" text-anchor="middle" class="badgeText">RUNS</text>
  <text x="632" y="230" class="groupTitle">runs/project</text>
  <text x="632" y="265" class="groupText">Technische Laufhistorie</text>
  <text x="632" y="292" class="groupText">Manifeste und Summaries</text>
  <text x="632" y="319" class="groupText">Hilft beim Nachvollziehen,</text>
  <text x="632" y="346" class="groupText">nicht beim ersten Lesen.</text>

  <rect x="885" y="150" width="255" height="230" rx="22" class="group"/>
  <rect x="907" y="170" width="68" height="28" rx="14" class="badge"/>
  <text x="941" y="189" text-anchor="middle" class="badgeText">STATE</text>
  <text x="907" y="230" class="groupTitle">state</text>
  <text x="907" y="265" class="groupText">Lokaler Betriebszustand</text>
  <text x="907" y="292" class="groupText">Queues, Alerts, Digests</text>
  <text x="907" y="319" class="groupText">Normalerweise lokal,</text>
  <text x="907" y="346" class="groupText">nicht fuer GitHub gedacht.</text>

  <path d="M300 265 H335" class="line"/>
  <path d="M575 265 H610" class="line"/>
  <path d="M850 265 H885" class="line"/>
</svg>
