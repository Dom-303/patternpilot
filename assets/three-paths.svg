<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Patternpilot — drei Wege in die Tiefe</title>
  <desc id="desc">Drei Karten nebeneinander, je ein Einstiegsweg in Patternpilot: Simple Guide fuer den ersten Eindruck, Getting Started fuer die Praxis, Design Guide fuer das Cockpit-Night-Designsystem.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #d7dee7; stroke-width: 2; }
      .header { font: 700 36px Arial, sans-serif; fill: #17324d; }
      .subhead { font: 400 16px Arial, sans-serif; fill: #4d5e70; }
      .badge { font: 700 12px Arial, sans-serif; fill: #ffffff; letter-spacing: 1px; }
      .cardLabel { font: 700 13px Arial, sans-serif; fill: #6b7c91; letter-spacing: 1.5px; }
      .cardTitle { font: 700 26px Arial, sans-serif; fill: #17324d; }
      .cardLead { font: 400 16px Arial, sans-serif; fill: #4d5e70; }
      .cardTag { font: 600 14px Arial, sans-serif; fill: #205f3c; }
      .pathLine { font: 600 13px 'Courier New', monospace; fill: #24486d; }
      .pillBg { fill: #eef4fb; stroke: #d5dfeb; stroke-width: 1.5; }
      .accentBlue { fill: #2563eb; }
      .accentGreen { fill: #16a34a; }
      .accentMagenta { fill: #c026d3; }
      .iconLight { fill: #ffffff; }
      .iconStroke { stroke: #ffffff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" class="bg"/>

  <!-- Header -->
  <text x="70" y="64" class="header">Drei Wege in die Tiefe</text>
  <text x="70" y="94" class="subhead">Such dir den Pfad, der zu deiner Sicht passt.  Alle drei sind gleichwertig.</text>

  <!-- Card 1: Simple Guide -->
  <rect x="60" y="140" width="350" height="240" rx="22" class="card"/>
  <circle cx="120" cy="200" r="32" class="accentBlue"/>
  <path d="M 105 200 L 120 215 L 140 188" class="iconStroke"/>
  <text x="170" y="184" class="cardLabel">PFAD 1 · ERSTE BERUEHRUNG</text>
  <text x="170" y="216" class="cardTitle">Simple Guide</text>
  <text x="78" y="262" class="cardLead">Sprache ohne Jargon. Erklaert</text>
  <text x="78" y="282" class="cardLead">in kurzen Saetzen, was Patternpilot</text>
  <text x="78" y="302" class="cardLead">ueberhaupt loest und wofuer.</text>
  <rect x="78" y="328" width="270" height="34" rx="10" class="pillBg"/>
  <text x="92" y="350" class="pathLine">docs/foundation/SIMPLE_GUIDE.md</text>

  <!-- Card 2: Getting Started -->
  <rect x="425" y="140" width="350" height="240" rx="22" class="card"/>
  <circle cx="485" cy="200" r="32" class="accentGreen"/>
  <path d="M 472 188 L 472 212 M 472 188 L 498 200 L 472 212" class="iconStroke"/>
  <text x="535" y="184" class="cardLabel">PFAD 2 · DIREKT IN DIE PRAXIS</text>
  <text x="535" y="216" class="cardTitle">Getting Started</text>
  <text x="443" y="262" class="cardLead">Vier Befehle, erster echter Run.</text>
  <text x="443" y="282" class="cardLead">Vom git clone bis zur ersten</text>
  <text x="443" y="302" class="cardLead">Bewertung deines Zielprojekts.</text>
  <rect x="443" y="328" width="295" height="34" rx="10" class="pillBg"/>
  <text x="457" y="350" class="pathLine">docs/foundation/GETTING_STARTED.md</text>

  <!-- Card 3: Design Guide -->
  <rect x="790" y="140" width="350" height="240" rx="22" class="card"/>
  <circle cx="850" cy="200" r="32" class="accentMagenta"/>
  <rect x="836" y="186" width="28" height="28" rx="3" class="iconLight"/>
  <rect x="844" y="194" width="20" height="4" class="accentMagenta"/>
  <rect x="844" y="202" width="14" height="4" class="accentMagenta"/>
  <rect x="844" y="210" width="20" height="4" class="accentMagenta"/>
  <text x="900" y="184" class="cardLabel">PFAD 3 · UNTER DIE HAUBE</text>
  <text x="900" y="216" class="cardTitle">Design Guide</text>
  <text x="808" y="262" class="cardLead">Cockpit Night von innen — 17</text>
  <text x="808" y="282" class="cardLead">Kapitel, 23 Tokens, alle Komponenten</text>
  <text x="808" y="302" class="cardLead">und Do/Don't-Karten.</text>
  <rect x="808" y="328" width="320" height="34" rx="10" class="pillBg"/>
  <text x="822" y="350" class="pathLine">docs/reference/REPORT_UI_TOKENS.html</text>
</svg>
